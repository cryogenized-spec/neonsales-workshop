<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonSales x Gareth Workshop</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">🛠️ NeonSales Workshop</div>
        <div class="nav-buttons">
            <button onclick="switchView('kanban')">Kanban</button>
            <button onclick="switchView('list')">List</button>
            <button onclick="showAIChat()">AI Assistant</button>
            <button onclick="showDocuments()">Documents</button>
            <button onclick="showSettings()">Settings</button>
        </div>
    </nav>

    <header>
        <h1>NeonSales x Gareth Workshop Jobs</h1>
        <p>Paintball & Airgun Repair Management System</p>
    </header>

    <div id="kanban-view" class="view">
        <div class="board" id="board"></div>
    </div>

    <div id="list-view" class="view" style="display:none;">
        <div class="list-container" id="task-list"></div>
    </div>

    <div id="ai-chat" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>AI Workshop Assistant (Gemini BYOK)</h2>
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Ask AI to add task, move task, summarize...">
            <button onclick="sendAIRequest()">Send</button>
        </div>
    </div>

    <div id="documents" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Workshop Documents (Markdown)</h2>
            <textarea id="doc-editor" placeholder="Write GitHub-flavored Markdown here..."></textarea>
            <button onclick="saveDocument()">Save Document</button>
            <div id="doc-preview"></div>
        </div>
    </div>

    <div id="settings" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Settings - Bring Your Own Key</h2>
            <label>Gemini API Key:</label>
            <input type="password" id="gemini-key" placeholder="Enter your Gemini key">
            <button onclick="saveSettings()">Save Keys</button>
            <p>Other providers coming soon.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
